<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudDocs — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #6c63ff, #3b1fa8);
      top: -150px; left: -100px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #00b4d8, #023e8a);
      bottom: -100px; right: -80px;
      animation-delay: -6s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    .card {
      position: relative;
      width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 44px 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6c63ff, #00b4d8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
    .logo-text span { color: #7c73ff; }

    h2 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.55); margin-bottom: 7px;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    input[type="text"], input[type="password"], select {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus, input[type="password"]:focus, select:focus {
      border-color: #6c63ff;
      background: rgba(108,99,255,0.1);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    select option { background: #1a1a2e; color: #fff; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 18px; color: rgba(255,255,255,0.2); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }

    button[type="submit"] {
      width: 100%; padding: 13px; margin-top: 6px;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600; border: none;
      border-radius: 10px; cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    }
    button[type="submit"]:hover {
      opacity: 0.92; transform: translateY(-1px);
      box-shadow: 0 6px 26px rgba(108,99,255,0.55);
    }
    button[type="submit"]:active { transform: translateY(0); opacity: 1; }

    .footer-note { margin-top: 22px; text-align: center; font-size: 11.5px; color: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📄</div>
      <div class="logo-text">Cloud<span>Docs</span></div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access the documentation editor</p>

    <form action="/login" method="post" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter your username" required autofocus />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required />
      </div>

      <div class="field">
        <label for="domain">Authentication</label>
        <select id="domain" name="domain">
          <option value="local">Local Account</option>
          <option value="ad">Active Directory</option>
        </select>
      </div>

      <div class="divider">branch settings</div>

      <div class="row-2">
        <div class="field">
          <label for="branch">Existing Branch</label>
          <select id="branch" name="branch">
            {{BRANCHES_DROPDOWN}}
          </select>
        </div>
        <div class="field">
          <label for="newBranch">New Branch</label>
          <input id="newBranch" type="text" name="newBranch" placeholder="my-feature" />
        </div>
      </div>

      <button type="submit">Sign In →</button>
    </form>

    <p class="footer-note">Secured by your organization's identity provider</p>
  </div>
</body>
</html>
